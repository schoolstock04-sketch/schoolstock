<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SchoolStock</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f3ef;
      margin: 0;
      padding: 20px;
      color: #222;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    input, button, select {
      padding: 10px;
      margin: 5px 0;
      width: 100%;
      box-sizing: border-box;
      font-size: 15px;
    }

    button {
      background: #d94f2b;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #b93f22;
    }

    .pedido {
      border-bottom: 1px solid #ddd;
      padding: 10px 0;
    }

    .status {
      font-weight: bold;
      color: #2b6dd9;
    }

    .stock-ok {
      color: green;
      font-weight: bold;
    }

    .stock-low {
      color: orange;
      font-weight: bold;
    }

    .stock-zero {
      color: red;
      font-weight: bold;
    }

    .barra-stock {
      height: 18px;
      background: #ddd;
      border-radius: 10px;
      overflow: hidden;
      margin-top: 5px;
    }

    .barra-fill {
      height: 100%;
      background: #2a8a56;
    }

    .ok { color: green; }
    .error { color: red; }

    .btn-secundario {
      background: #2a8a56;
    }

    .btn-secundario:hover {
      background: #207346;
    }

    .alerta-faltante {
      border: 1px solid #f0c4bb;
      background: #fff1ee;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
    }

    .alerta-faltante strong {
      color: #d94f2b;
    }

    .alerta-faltante span {
      color: #555;
    }


    .caja-item {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
      background: white;
    }

    .coincide {
      color: green;
      font-weight: bold;
    }

    .no-coincide {
      color: red;
      font-weight: bold;
    }

    #modal-movimiento,
    #modal-producto,
    #modal-paqueteria {
      display: none;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
  </style>
</head>

<body>

  <h1>SchoolStock</h1>
  <p id="estado">Conectando...</p>

  <div class="card">
  <h2>Seleccionar colegio</h2>

  <button onclick="abrirNuevoColegio()">
    + Añadir colegio
  </button>

  <div id="colegio-activo-label">
    Ningún colegio seleccionado
  </div>

  <div id="lista-colegios"></div>
</div>

<div id="modal-colegio" class="card" style="display:none;">
  <h2>Nuevo colegio</h2>

  <input
    id="nuevo-colegio-nombre"
    placeholder="Nombre del colegio"
  >

  <input
    id="nuevo-colegio-periodo"
    placeholder="Periodo de venta"
  >

  <input
    id="nuevo-colegio-promotor"
    placeholder="Promotor"
  >

  <input
    id="nuevo-colegio-cuenta"
    placeholder="Cuenta"
  >

  <input
    id="nuevo-colegio-password"
    placeholder="Password"
  >

  <button onclick="guardarColegio()">
    Guardar colegio
  </button>

  <button onclick="cerrarNuevoColegio()">
    Cancelar
  </button>
</div>

  <div class="card">
  <h2>Nuevo pedido</h2>

  <input
    id="qr-pedido"
    placeholder="Escanea QR del pedido aquí"
    onkeydown="leerQRPedido(event)"
  >

  <input id="id" placeholder="No. de pedido">
  <input id="alumno" placeholder="Alumno">
  <input id="grado" placeholder="Grado">
  <select id="colegio"></select>

  <input
    id="scan-isbn"
    placeholder="Escanea ISBN del libro"
    onkeydown="leerISBN(event)"
  >

  <div id="resultado-isbn"></div>

  <input id="productos" placeholder="Productos separados por /">

  <button onclick="guardarPedido()">Guardar pedido</button>
</div>

  <div class="card">
    <h2>Inventario</h2>

    <button onclick="abrirNuevoProducto()">+ Producto</button>
    <button class="btn-secundario" onclick="abrirMovimientoInventario()">+ Entrada inventario</button>
  </div>

  <div id="modal-producto">
    <h2>Nuevo producto</h2>
   
    <input
     id="scan-isbn-producto"
     placeholder="Escanea ISBN del producto"
     onkeydown="leerISBNProducto(event)"
    >

<div id="resultado-isbn-producto"></div>
    <input id="prod-nombre" placeholder="Nombre del producto">
    <select id="prod-colegio"></select>
    <input id="prod-stock" type="number" placeholder="Stock inicial">
    <input id="prod-max" type="number" placeholder="Stock máximo / referencia">

    <button onclick="guardarProducto()">Guardar producto</button>
    <button onclick="cerrarNuevoProducto()">Cancelar</button>
  </div>

  <div id="modal-movimiento">
    <h2>Entrada de inventario</h2>

    <input
     id="scan-isbn-movimiento"
     placeholder="Escanea ISBN del producto"
     onkeydown="leerISBNMovimiento(event)"
   >

<div id="resultado-isbn-movimiento"></div>

    <input id="mov-producto" placeholder="Producto">
    <select id="mov-colegio"></select>
    <input id="mov-cantidad" type="number" placeholder="Cantidad">
    <input id="mov-nota" placeholder="Nota">

    <button onclick="guardarMovimientoInventario()">Guardar entrada</button>
    <button onclick="cerrarMovimientoInventario()">Cancelar</button>
  </div>

  <div id="modal-paqueteria">
    <h2>Registrar envío</h2>

    <input id="paq-id" placeholder="Número de pedido" readonly>

    <select id="paq-tipo">
      <option value="">Selecciona tipo</option>
      <option value="Estafeta">Estafeta</option>
      <option value="FedEx">FedEx</option>
      <option value="Escuela">Entrega en escuela</option>
    </select>

    <input id="paq-alumno" placeholder="Alumno" readonly>
    <input id="paq-escuela" placeholder="Escuela" readonly>
    <input id="paq-grado" placeholder="Grado" readonly>

    <input id="paq-fecha" type="date">

    <button onclick="guardarPaquete()">Guardar envío</button>
    <button onclick="cerrarPaqueteria()">Cancelar</button>
  </div>

  <div class="card">
    <h2>Relación de cajas</h2>

    <input id="caja-numero" placeholder="Número de caja. Ej. Caja 1">
    <select id="caja-colegio"></select>

    <input
      id="caja-pedido"
      placeholder="Escanea o escribe número de pedido"
      onkeydown="leerPedidoCaja(event)"
    >

    <button onclick="agregarPedidoACaja()">Agregar pedido a caja</button>
    <button class="btn-secundario" onclick="cargarCajas()">Actualizar relación</button>

    <div id="lista-cajas"></div>
  </div>

<div class="card">
  <h2>Buscar ubicación de pedido</h2>

  <input
    id="buscar-ubicacion-pedido"
    placeholder="Escanea o escribe número de pedido"
    onkeydown="leerBusquedaUbicacion(event)"
  >

  <button onclick="buscarUbicacionPedido()">Buscar ubicación</button>

  <div id="resultado-ubicacion"></div>
</div>

  <div class="card">
  <h2>Panel de inventario</h2>

  <button
  id="btn-minimizar-inventario"
  class="btn-secundario"
  onclick="toggleInventarioAlertas()"
>
  Ocultar lista de inventario
</button>

  <div id="kpis-inventario"></div>
  <br>
  <div id="lista-inventario"></div>
</div>

  <div class="card">
    <h2>Productos que bloquean pedidos</h2>
    <div id="alertas-faltantes"></div>
  </div>

  <div class="card">
  <h2>Pedidos registrados</h2>

  <input
    id="buscar-pedido"
    placeholder="Buscar pedido por código"
    oninput="filtrarPedidos()"
  >

  <button onclick="cargarPedidos()">Actualizar</button>

  <div id="lista-pedidos"></div>
</div>
	

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxrtruUjmJT-2BHkX-D03NO_J6cEAbFHzA5rbeCHETPsINNxr1t8zdDlwQRa-N1ttz0/exec";
    let pedidosGlobal = [];
    let pedidosFiltrados = [];
    let colegioActivo = "";
    let soloAlertasInventario = false;

    async function cargarPedidos() {
  const estado = document.getElementById("estado");
  const lista = document.getElementById("lista-pedidos");

  if (!colegioActivo) {
    lista.innerHTML = `
      <p>Selecciona un colegio para ver pedidos.</p>
    `;

    estado.textContent = "Selecciona un colegio";
    estado.className = "";

    return;
  }

  try {
    estado.textContent = "Cargando pedidos...";
    estado.className = "";

    const respuesta = await fetch(`${SCRIPT_URL}?hoja=Pedidos`);
    const datos = await respuesta.json();

    const filas = datos.slice(1);

    pedidosGlobal = filas;
    pedidosFiltrados = filas;

    filtrarPedidos();

    estado.textContent = "Conectado a Google Sheets";
    estado.className = "ok";

  } catch (error) {
    estado.textContent = "Error al conectar con Google Sheets";
    estado.className = "error";

    console.error(error);
  }
}

let colegiosGlobal = [];

async function cargarColegios() {
  try {
    const respuesta = await fetch(`${SCRIPT_URL}?colegios=1`);
    const colegios = await respuesta.json();

    colegiosGlobal = colegios;

    renderColegios(colegios);

    const selects = [
      "colegio",
      "caja-colegio",
      "prod-colegio",
      "mov-colegio"
    ];

    selects.forEach(id => {
      const select = document.getElementById(id);

      if (!select) return;

      select.innerHTML = `
        <option value="">Selecciona colegio</option>
      `;

      colegios.forEach(item => {
        const nombre = item.colegio || item;

        select.innerHTML += `
          <option value="${nombre}">
            ${nombre}
          </option>
        `;
      });
    });

  } catch(error) {
    console.error(error);
  }
}

function renderColegios(colegios) {
  const contenedor = document.getElementById("lista-colegios");

  if (!contenedor) return;

  if (!colegios || colegios.length === 0) {
    contenedor.innerHTML = "<p>No hay colegios registrados.</p>";
    return;
  }

  contenedor.innerHTML = colegios.map(item => {
    const nombre = item.colegio || "";
    const periodo = item.periodoVenta || "";
    const promotor = item.promotor || "";
    const cuenta = item.cuenta || "";
    const password = item.password || "";

    if (
      colegioActivo &&
      normalizarTexto(nombre) !== normalizarTexto(colegioActivo)
    ) {
      return "";
    }

    const activo =
      normalizarTexto(nombre) === normalizarTexto(colegioActivo);

    return `
      <div style="
        border:2px solid ${activo ? "#2a8a56" : "#ddd"};
        border-radius:14px;
        padding:14px;
        margin:10px 0;
        background:${activo ? "#effaf3" : "#fff"};
      ">
        <h3>${nombre}</h3>

        <p><strong>Periodo:</strong><br>${periodo}</p>
        <p><strong>Promotor:</strong><br>${promotor}</p>
        <p><strong>Cuenta:</strong><br>${cuenta}</p>
        <p><strong>Password:</strong><br>${password}</p>

        <button onclick="seleccionarColegio('${nombre}')">
          Entrar
        </button>

        ${
          colegioActivo
            ? `<button class="btn-secundario" onclick="limpiarFiltroGlobal()">
                 Mostrar todos los colegios
               </button>`
            : ""
        }
      </div>
    `;
  }).join("");
}

function seleccionarColegio(nombre) {
  colegioActivo = nombre;

  document.getElementById("colegio-activo-label").innerHTML =
    `<strong>Colegio activo:</strong> ${nombre}`;

  renderColegios(colegiosGlobal);

  cargarPedidos();
  cargarInventario();
  cargarAlertasFaltantes();
  cargarCajas();
}

function limpiarFiltroGlobal() {
  colegioActivo = "";

  document.getElementById("colegio-activo-label").innerHTML =
    "Ningún colegio seleccionado";

  renderColegios(colegiosGlobal);

  filtrarPedidos();
  cargarInventario();
  cargarAlertasFaltantes();
  cargarCajas();
}

function abrirNuevoColegio() {
  const modal = document.getElementById("modal-colegio");
  modal.style.display = "block";

  modal.scrollIntoView({
    behavior: "smooth",
    block: "start"
  });
}

function cerrarNuevoColegio() {
  document.getElementById("modal-colegio").style.display = "none";

  document.getElementById("nuevo-colegio-nombre").value = "";
  document.getElementById("nuevo-colegio-periodo").value = "";
  document.getElementById("nuevo-colegio-promotor").value = "";
  document.getElementById("nuevo-colegio-cuenta").value = "";
  document.getElementById("nuevo-colegio-password").value = "";
}

	function filtrarPedidos() {
  const lista = document.getElementById("lista-pedidos");

  lista.innerHTML = "";

  if (!colegioActivo) {
    lista.innerHTML = `
      <p>Selecciona un colegio para ver pedidos.</p>
    `;
    return;
  }

  const texto = document
    .getElementById("buscar-pedido")
    .value
    .trim();

  pedidosFiltrados = pedidosGlobal.filter(fila => {
    const idPedido = String(fila[0]);
    const colegioPedido = String(fila[3] || "");

    const coincideTexto =
      !texto || idPedido.includes(texto);

    const coincideColegio =
      normalizarTexto(colegioPedido) ===
      normalizarTexto(colegioActivo);

    return coincideTexto && coincideColegio;
  });

  pedidosFiltrados.forEach(fila => {
    const pedido = document.createElement("div");
    pedido.className = "pedido";

    const id = fila[0];
    const alumno = fila[1];
    const grado = fila[2];
    const colegio = fila[3];
    const productos = fila[4];
    const faltantes = fila[5] || "";
    const status = fila[6] || "pendiente";

    pedido.innerHTML = `
      <strong>#${id}</strong><br>
      Alumno: ${alumno}<br>
      Grado: ${grado}<br>
      Colegio: ${colegio}<br>
      Productos: ${productos}<br>
      Faltantes: ${faltantes || "Ninguno"}<br>
      Estado: <span class="status">${status}</span><br><br>

      <button onclick="marcarCompleto('${id}')">
        ✓ Completo
      </button>

      <button onclick="marcarIncompleto('${id}')">
        ✗ Incompleto
      </button>

      <button onclick="abrirPaqueteriaPorId('${id}')">
        📦 Registrar envío
      </button>
    `;

    lista.appendChild(pedido);
  });

  if (pedidosFiltrados.length === 0) {
    lista.innerHTML = `
      <p>No se encontraron pedidos con ese filtro.</p>
    `;
  }
}

async function guardarColegio() {
  const colegio = document
    .getElementById("nuevo-colegio-nombre")
    .value
    .trim();

  const periodoVenta = document
    .getElementById("nuevo-colegio-periodo")
    .value
    .trim();

  const promotor = document
    .getElementById("nuevo-colegio-promotor")
    .value
    .trim();

  const cuenta = document
    .getElementById("nuevo-colegio-cuenta")
    .value
    .trim();

  const password = document
    .getElementById("nuevo-colegio-password")
    .value
    .trim();

  if (
    !colegio ||
    !periodoVenta ||
    !promotor ||
    !cuenta ||
    !password
  ) {
    alert("Completa todos los datos.");
    return;
  }

  try {
    const respuesta = await fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({
        accion: "crearColegio",
        colegio,
        periodoVenta,
        promotor,
        cuenta,
        password
      })
    });

    const resultado = await respuesta.json();

    if (!resultado.ok) {
      alert("Error: " + resultado.error);
      return;
    }

    alert("Colegio guardado correctamente.");

    cerrarNuevoColegio();
    cargarColegios();

  } catch(error) {
    console.error(error);
    alert("No se pudo guardar el colegio.");
  }
}

    async function guardarPedido() {
      const id = document.getElementById("id").value.trim();
      const alumno = document.getElementById("alumno").value.trim();
      const grado = document.getElementById("grado").value.trim();
      const colegio = document.getElementById("colegio").value.trim();
      const productos = document.getElementById("productos").value.trim();

      if (!id || !alumno || !grado || !colegio || !productos) {
        alert("Completa todos los campos.");
        return;
      }

      const fila = [id, alumno, grado, colegio, productos, "", "pendiente"];

      try {
        const respuesta = await fetch(SCRIPT_URL, {
          method: "POST",
          body: JSON.stringify({
            accion: "crear",
            hoja: "Pedidos",
            fila: fila
          })
        });

        const resultado = await respuesta.json();

        if (!resultado.ok) {
          alert("Error: " + resultado.error);
          return;
        }

        alert("Pedido guardado correctamente.");

        document.getElementById("id").value = "";
        document.getElementById("alumno").value = "";
        document.getElementById("grado").value = "";
        document.getElementById("colegio").value = "";
        document.getElementById("productos").value = "";

        cargarPedidos();
        cargarAlertasFaltantes();

      } catch (error) {
        alert("No se pudo guardar el pedido.");
        console.error(error);
      }
    }

function leerQRPedido(event) {
  if (event.key !== "Enter") return;

  const inputQR = document.getElementById("qr-pedido");
  const texto = inputQR.value.trim();

  if (!texto) return;

  const partes = texto.split("+");

  if (partes.length < 4) {
    alert("QR inválido. Formato esperado: pedido]alumno]grado]colegio");
    return;
  }

  document.getElementById("id").value = partes[0].trim();
  document.getElementById("alumno").value = partes[1].trim();
  document.getElementById("grado").value = partes[2].trim();
  document.getElementById("colegio").value = partes[3].trim();

  inputQR.value = "";
  document.getElementById("productos").focus();
}    async function marcarCompleto(id) {
      try {
        const respuesta = await fetch(SCRIPT_URL, {
          method: "POST",
          body: JSON.stringify({
            accion: "completarConInventario",
            id: id
          })
        });

        const resultado = await respuesta.json();

        if (!resultado.ok) {
          const faltantes = resultado.faltantes || [];

          alert(
            "Pedido incompleto. Faltantes: " +
            faltantes.join(", ")
          );

        } else {
          alert("Pedido completo. Inventario descontado correctamente.");
        }

        cargarPedidos();
        cargarInventario();
        cargarAlertasFaltantes();

      } catch (error) {
        alert("No se pudo completar el pedido.");
        console.error(error);
      }
    }

function leerISBN(event) {
  if (event.key !== "Enter") return;

  event.preventDefault();

  buscarISBN();
}

async function buscarISBN() {
  const isbn = document
    .getElementById("scan-isbn")
    .value
    .trim();

  const resultado = document.getElementById("resultado-isbn");

  if (!isbn) return;

  try {
    resultado.innerHTML = "<p>Buscando libro...</p>";

    const respuesta = await fetch(
      `${SCRIPT_URL}?isbn=${isbn}`
    );

    const libro = await respuesta.json();

    if (!libro) {
      resultado.innerHTML = `
        <p style="color:red;">
          Libro no encontrado
        </p>
      `;
      return;
    }

    const inputProductos = document.getElementById("productos");
    const productosActuales = inputProductos.value.trim();

    if (productosActuales) {
      inputProductos.value = productosActuales + "/" + libro.titulo;
    } else {
      inputProductos.value = libro.titulo;
    }

    resultado.innerHTML = `
      <div style="
        background:#fff;
        border:1px solid #ddd;
        border-radius:10px;
        padding:10px;
        margin-top:10px;
      ">
        <strong>Libro agregado:</strong><br>
        ${libro.titulo}<br>
        ISBN: ${libro.isbn}
      </div>
    `;

    document.getElementById("scan-isbn").value = "";
    document.getElementById("scan-isbn").focus();

  } catch(error) {
    console.error(error);

    resultado.innerHTML = `
      <p style="color:red;">
        Error al buscar ISBN
      </p>
    `;
  }
}

function leerISBNProducto(event) {
  if (event.key !== "Enter") return;

  event.preventDefault();

  buscarISBNParaCampo(
    "scan-isbn-producto",
    "prod-nombre",
    "resultado-isbn-producto"
  );
}

function leerISBNMovimiento(event) {
  if (event.key !== "Enter") return;

  event.preventDefault();

  buscarISBNParaCampo(
    "scan-isbn-movimiento",
    "mov-producto",
    "resultado-isbn-movimiento"
  );
}

async function buscarISBNParaCampo(inputISBNId, campoDestinoId, resultadoId) {
  const isbn = document.getElementById(inputISBNId).value.trim();
  const resultado = document.getElementById(resultadoId);

  if (!isbn) return;

  try {
    resultado.innerHTML = "<p>Buscando libro...</p>";

    const respuesta = await fetch(`${SCRIPT_URL}?isbn=${isbn}`);
    const libro = await respuesta.json();

    if (!libro) {
      resultado.innerHTML = `
        <p style="color:red;">
          Libro no encontrado
        </p>
      `;
      return;
    }

    document.getElementById(campoDestinoId).value = libro.titulo;

    resultado.innerHTML = `
      <div style="
        background:#fff;
        border:1px solid #ddd;
        border-radius:10px;
        padding:10px;
        margin-top:10px;
      ">
        <strong>Libro detectado:</strong><br>
        ${libro.titulo}<br>
        ISBN: ${libro.isbn}
      </div>
    `;

    document.getElementById(inputISBNId).value = "";
    document.getElementById(campoDestinoId).focus();

  } catch(error) {
    console.error(error);

    resultado.innerHTML = `
      <p style="color:red;">
        Error al buscar ISBN
      </p>
    `;
  }
}

    async function marcarIncompleto(id) {
      const faltantes = prompt("Escribe los productos faltantes separados por |");

      if (faltantes === null) return;

      try {
        const respuesta = await fetch(SCRIPT_URL, {
          method: "POST",
          body: JSON.stringify({
            accion: "actualizarPedido",
            id: id,
            status: "incompleto",
            faltantes: faltantes
          })
        });

    async function cargarCajas() {
  try {
    const respuesta = await fetch(`${SCRIPT_URL}?hoja=Cajas`);
    const datos = await respuesta.json();
    const filas = datos.slice(1);

    if (!colegioActivo) {
      document.getElementById("lista-cajas").innerHTML =
        "<p>Selecciona un colegio para ver cajas.</p>";
      return;
    }

    const filtradas = filas.filter(fila =>
      normalizarTexto(fila[2]) === normalizarTexto(colegioActivo)
    );

    renderCajas(filtradas);

  } catch(error) {
    console.error(error);
  }
}

    function renderCajas(filas) {
  const contenedor = document.getElementById("lista-cajas");

  if (!filas || filas.length === 0) {
    contenedor.innerHTML = "<p>No hay pedidos relacionados a cajas.</p>";
    return;
  }

  const cajas = {};

  filas.forEach(fila => {
    const caja = fila[0];
    const pedido = fila[1];
    const colegioCaja = fila[2];
    const colegioPedido = fila[3];
    const alumno = fila[4];
    const grado = fila[5];
    const fecha = fila[6];

    if (!cajas[caja]) {
      cajas[caja] = {
        colegioCaja: colegioCaja,
        pedidos: []
      };
    }

    cajas[caja].pedidos.push({
      pedido,
      colegioCaja,
      colegioPedido,
      alumno,
      grado,
      fecha
    });
  });

  window.cajasGlobal = cajas;

  contenedor.innerHTML = Object.entries(cajas).map(([caja, data]) => {
    const total = data.pedidos.length;

    const errores = data.pedidos.filter(p =>
      normalizarTexto(p.colegioCaja) !== normalizarTexto(p.colegioPedido)
    ).length;

    return `
      <div style="
        border:1px solid #ddd;
        border-radius:12px;
        padding:14px;
        margin-bottom:14px;
        background:#fff;
      ">
        <h3>${caja} — ${data.colegioCaja}</h3>

        <p>
          Pedidos en caja: <strong>${total}</strong>
          ${errores > 0 ? `<br><strong style="color:red;">⚠ ${errores} pedido(s) de otro colegio</strong>` : ""}
        </p>

        <button class="btn-secundario" onclick="imprimirCaja('${caja}')">
          🖨 Imprimir relación
        </button>

        ${data.pedidos.map(p => {
          const errorColegio =
            normalizarTexto(p.colegioCaja) !== normalizarTexto(p.colegioPedido);

          return `
            <div style="
              border-top:1px solid #eee;
              padding:8px 0;
              ${errorColegio ? "background:#fff1ee;" : ""}
            ">
              <strong>#${p.pedido}</strong><br>
              Alumno: ${p.alumno}<br>
              Grado: ${p.grado}<br>
              Colegio pedido:
              <span style="color:${errorColegio ? "red" : "green"}; font-weight:bold;">
                ${p.colegioPedido}
              </span>
            </div>
          `;
        }).join("")}
      </div>
    `;
  }).join("");
}

    async function cargarInventario() {
  try {
    const respuesta = await fetch(`${SCRIPT_URL}?hoja=Inventario`);
    const datos = await respuesta.json();
    const filas = datos.slice(1);

    if (!colegioActivo) {
      renderInventario([]);
      return;
    }

    const filtradas = filas.filter(fila =>

    );

function toggleInventarioAlertas() {
  soloAlertasInventario = !soloAlertasInventario;

  document.getElementById("btn-minimizar-inventario").textContent =
    soloAlertasInventario
      ? "Mostrar lista de inventario"
      : "Ocultar lista de inventario";

  cargarInventario();
}

    function renderInventario(filas) {
  const lista = document.getElementById("lista-inventario");
  const kpis = document.getElementById("kpis-inventario");

  lista.innerHTML = "";

  let ok = 0;
  let low = 0;
  let zero = 0;

  filas.forEach(fila => {
    const stock = Number(fila[2]);

    if (stock <= 0) zero++;
    else if (stock <= 5) low++;
    else ok++;
  });

  kpis.innerHTML = `
    <div style="display:flex; gap:12px; flex-wrap:wrap;">
      <div class="card" style="flex:1; min-width:120px;">
        <h3 style="color:green;">${ok}</h3>
        <p>Stock OK</p>
      </div>

      <div class="card" style="flex:1; min-width:120px;">
        <h3 style="color:orange;">${low}</h3>
        <p>Stock bajo</p>
      </div>

      <div class="card" style="flex:1; min-width:120px;">
        <h3 style="color:red;">${zero}</h3>
        <p>Sin stock</p>
      </div>
    </div>
  `;

  if (soloAlertasInventario) {
    lista.innerHTML = `
      <p>Lista de inventario oculta.</p>
    `;
    return;
  }

  filas.forEach(fila => {
    const nombre = fila[0];
    const colegio = fila[1];
    const stock = Number(fila[2]);
    const max = Number(fila[3]) || 20;

    let clase = "stock-ok";
    let estado = "OK";
    let color = "#2a8a56";

    if(stock <= 0) {
      clase = "stock-zero";
      estado = "SIN STOCK";
      color = "#d94f2b";
    }
    else if(stock <= 5) {
      clase = "stock-low";
      estado = "BAJO";
      color = "#d48b00";
    }

    const porcentaje = Math.min((stock / max) * 100, 100);

    lista.innerHTML += `
      <div style="
        border:1px solid #ddd;
        border-radius:10px;
        padding:12px;
        margin-bottom:12px;
        background:white;
      ">
        <strong>${nombre}</strong><br>
        <span style="color:#666">${colegio}</span>

        <div class="${clase}">
          ${estado} — ${stock}/${max}
        </div>

        <div class="barra-stock">
          <div class="barra-fill"
            style="
              width:${porcentaje}%;
              background:${color};
            ">
          </div>
        </div>
      </div>
    `;
  });

  if (filas.length === 0) {
    lista.innerHTML = `
      <p>No hay productos para mostrar.</p>
    `;
  }
}

async function cargarAlertasFaltantes() {
  try {
    const [resPedidos, resInventario] = await Promise.all([
      fetch(`${SCRIPT_URL}?hoja=Pedidos`),
      fetch(`${SCRIPT_URL}?hoja=Inventario`)
    ]);

    const pedidosData = await resPedidos.json();
    const inventarioData = await resInventario.json();

    const pedidos = pedidosData.slice(1);
    const inventario = inventarioData.slice(1);

    if (!colegioActivo) {
      document.getElementById("alertas-faltantes").innerHTML =
        "<p>Selecciona un colegio para ver faltantes.</p>";
      return;
    }

    const pedidosFiltrados = pedidos.filter(pedido =>
      normalizarTexto(pedido[3]) === normalizarTexto(colegioActivo)
    );

    const inventarioFiltrado = inventario.filter(inv =>
      normalizarTexto(inv[1]) === normalizarTexto(colegioActivo)
    );

    renderAlertasFaltantes(pedidosFiltrados, inventarioFiltrado);

  } catch (error) {
    console.error(error);
  }
}

    function renderAlertasFaltantes(pedidos, inventario) {
      const contenedor = document.getElementById("alertas-faltantes");
      const mapa = {};

      pedidos.forEach(pedido => {
        const colegio = pedido[3];

        const faltantes = String(pedido[5] || "")
          .split("|")
          .map(x => x.trim())
          .filter(Boolean);

        faltantes.forEach(producto => {
          const clave = `${normalizarTexto(producto)}__${normalizarTexto(colegio)}`;

          if (!mapa[clave]) {
            mapa[clave] = {
              producto: producto,
              colegio: colegio,
              pedidos: 0,
              stock: "No encontrado"
            };
          }

          mapa[clave].pedidos++;
        });
      });

      Object.values(mapa).forEach(item => {
        const encontrado = inventario.find(inv =>
          normalizarTexto(inv[0]) === normalizarTexto(item.producto) &&
          normalizarTexto(inv[1]) === normalizarTexto(item.colegio)
        );

        if (encontrado) {
          item.stock = Number(encontrado[2]);
        }
      });

      const alertas = Object.values(mapa)
        .sort((a, b) => b.pedidos - a.pedidos);

      if (alertas.length === 0) {
        contenedor.innerHTML = "<p>No hay productos bloqueando pedidos.</p>";
        return;
      }

      contenedor.innerHTML = alertas.map(item => `
        <div class="alerta-faltante">
          <strong>${item.producto}</strong><br>
          <span>${item.colegio}</span><br>
          Falta en <strong>${item.pedidos}</strong> pedido(s)<br>
          Stock actual: <strong>${item.stock}</strong>
        </div>
      `).join("");
    }

    function normalizarTexto(texto) {
      return String(texto)
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .trim();
    }

    async function guardarMovimientoInventario() {
      const producto = document.getElementById("mov-producto").value.trim();
      const colegio = document.getElementById("mov-colegio").value.trim();
      const cantidad = Number(document.getElementById("mov-cantidad").value);
      const nota = document.getElementById("mov-nota").value.trim();

      if (!producto || !colegio || cantidad <= 0) {
        alert("Completa producto, colegio y cantidad.");
        return;
      }

      try {
        const respuesta = await fetch(SCRIPT_URL, {
          method: "POST",
          body: JSON.stringify({
            accion: "movimientoInventario",
            tipo: "entrada",
            producto: producto,
            colegio: colegio,
            cantidad: cantidad,
            nota: nota
          })
        });

        const resultado = await respuesta.json();

        if (!resultado.ok) {
          alert("Error: " + resultado.error);
          return;
        }

        alert("Entrada registrada. Nuevo stock: " + resultado.nuevoStock);

        cerrarMovimientoInventario();
        cargarInventario();
        cargarAlertasFaltantes();

      } catch (error) {
        alert("No se pudo guardar el movimiento.");
        console.error(error);
      }
    }

    cargarPedidos();
    cargarInventario();
    cargarAlertasFaltantes();
    cargarCajas();
    cargarColegios();
  </script>
